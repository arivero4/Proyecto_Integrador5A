# Configuración del Microservicio Territorial
server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: ms-territorial
  
  # Configuración de JSON
  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Logging
logging:
  level:
    root: INFO
    rest: DEBUG
    presentacionA: DEBUG
    negocioA: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# URLs de otros microservicios
microservices:
  usuarios:
    url: http://localhost:8081
  inspecciones:
    url: http://localhost:8083

# Información del microservicio
info:
  app:
    name: Microservicio Territorial
    description: Gestión de estructura territorial y lugares de producción
    version: 1.0.0
    port: 8082
