version: "3.9"

services:
  oracle-db:
    image: gvenzl/oracle-xe:11-slim
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./config/oracle/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agro-network
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "system/oracle@localhost:1521/XE"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  usuarios-service:
    build:
      context: .
      dockerfile: java/usuarios-service/Dockerfile
    container_name: usuarios-service
    ports:
      - "8081:8081"
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
    networks:
      - agro-network
    restart: unless-stopped

  predios-service:
    build:
      context: .
      dockerfile: java/predios-service/Dockerfile
    container_name: predios-service
    ports:
      - "8082:8082"
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
    networks:
      - agro-network
    restart: unless-stopped

  inspecciones-service:
    build:
      context: .
      dockerfile: java/inspecciones-service/Dockerfile
    container_name: inspecciones-service
    ports:
      - "8083:8083"
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
    networks:
      - agro-network
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local

networks:
  agro-network:
    driver: bridge
