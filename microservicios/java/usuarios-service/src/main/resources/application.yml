spring:
  application:
    name: ms-usuarios

  datasource:
    url: jdbc:oracle:thin:@localhost:1522:XE
    username: PROYECTO5A
    password: PROYECTO5A
    driver-class-name: oracle.jdbc.driver.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.OracleDialect
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: false

server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.usuarios: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

jwt:
  secret: AgroSistema2026$SecretKeyParaJWT_TokenGeneracionValidacion_512bits!!
  expiration: 86400000

microservices:
  territorial:
    url: http://localhost:8082
  inspecciones:
